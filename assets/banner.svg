<svg width="900" height="220" viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#0a1a12;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1f17;stop-opacity:1" />
    </linearGradient>
    <!-- Glow effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Pulse animation radial -->
    <radialGradient id="pulseGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00d4aa;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#00d4aa;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Base background -->
  <rect width="900" height="220" fill="url(#bgGrad)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.06" stroke="#00d4aa" stroke-width="0.5">
    <line x1="0" y1="40" x2="900" y2="40"/>
    <line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="0" y1="200" x2="900" y2="200"/>
    <line x1="100" y1="0" x2="100" y2="220"/>
    <line x1="200" y1="0" x2="200" y2="220"/>
    <line x1="300" y1="0" x2="300" y2="220"/>
    <line x1="400" y1="0" x2="400" y2="220"/>
    <line x1="500" y1="0" x2="500" y2="220"/>
    <line x1="600" y1="0" x2="600" y2="220"/>
    <line x1="700" y1="0" x2="700" y2="220"/>
    <line x1="800" y1="0" x2="800" y2="220"/>
  </g>

  <!-- Circuit traces left -->
  <g opacity="0.18" stroke="#00b96b" stroke-width="1.2" fill="none">
    <path d="M 30 60 L 80 60 L 80 100 L 120 100"/>
    <circle cx="80" cy="60" r="3" fill="#00b96b"/>
    <circle cx="120" cy="100" r="3" fill="#00b96b"/>
    <path d="M 30 140 L 60 140 L 60 170 L 100 170 L 100 150"/>
    <circle cx="60" cy="140" r="3" fill="#00b96b"/>
    <path d="M 20 90 L 50 90"/>
    <circle cx="20" cy="90" r="2.5" fill="#00d4aa"/>
  </g>

  <!-- Circuit traces right -->
  <g opacity="0.18" stroke="#00b96b" stroke-width="1.2" fill="none">
    <path d="M 870 60 L 820 60 L 820 100 L 780 100"/>
    <circle cx="820" cy="60" r="3" fill="#00b96b"/>
    <circle cx="780" cy="100" r="3" fill="#00b96b"/>
    <path d="M 870 140 L 840 140 L 840 170 L 800 170 L 800 150"/>
    <circle cx="840" cy="140" r="3" fill="#00b96b"/>
    <path d="M 880 90 L 850 90"/>
    <circle cx="880" cy="90" r="2.5" fill="#00d4aa"/>
  </g>

  <!-- Central glow pulse -->
  <ellipse cx="450" cy="110" rx="280" ry="90" fill="url(#pulseGrad)">
    <animate attributeName="rx" values="280;320;280" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.6;1" dur="4s" repeatCount="indefinite"/>
  </ellipse>

  <!-- TOP BADGE: Top Rated Plus -->
  <g filter="url(#glow)">
    <rect x="360" y="14" width="180" height="22" rx="11" fill="none" stroke="#00d4aa" stroke-width="1"/>
    <text x="450" y="29" font-family="'Courier New', monospace" font-size="10" fill="#00d4aa" text-anchor="middle" letter-spacing="2">★ TOP RATED PLUS ★</text>
  </g>

  <!-- MAIN NAME -->
  <text x="450" y="90" font-family="'Courier New', monospace" font-weight="700" font-size="46" fill="#ffffff" text-anchor="middle" filter="url(#glow)" letter-spacing="1">
    MAZHARUL ISLAM
  </text>

  <!-- GREEN ACCENT LINE -->
  <line x1="200" y1="100" x2="700" y2="100" stroke="#00d4aa" stroke-width="1.5" opacity="0.5">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
  </line>

  <!-- SUBTITLE -->
  <text x="450" y="130" font-family="'Courier New', monospace" font-size="14" fill="#00d4aa" text-anchor="middle" letter-spacing="3" filter="url(#glow)">
    GoHighLevel Expert  |  CRM Automation  |  AI Funnels  |  SaaS Architecture
  </text>

  <!-- BOTTOM STATS ROW -->
  <g font-family="'Courier New', monospace" font-size="11" fill="#a3f7d4">
    <!-- stat 1 -->
    <text x="160" y="168" text-anchor="middle" font-weight="700" font-size="18" fill="#00d4aa" filter="url(#glow)">477+</text>
    <text x="160" y="184" text-anchor="middle" fill="#6b9e80">JOBS DONE</text>

    <!-- divider -->
    <line x1="240" y1="158" x2="240" y2="188" stroke="#00d4aa" stroke-width="0.8" opacity="0.4"/>

    <!-- stat 2 -->
    <text x="320" y="168" text-anchor="middle" font-weight="700" font-size="18" fill="#00d4aa" filter="url(#glow)">$200K+</text>
    <text x="320" y="184" text-anchor="middle" fill="#6b9e80">TOTAL EARNED</text>

    <!-- divider -->
    <line x1="400" y1="158" x2="400" y2="188" stroke="#00d4aa" stroke-width="0.8" opacity="0.4"/>

    <!-- stat 3 -->
    <text x="450" y="168" text-anchor="middle" font-weight="700" font-size="18" fill="#00d4aa" filter="url(#glow)">92%</text>
    <text x="450" y="184" text-anchor="middle" fill="#6b9e80">JOB SUCCESS</text>

    <!-- divider -->
    <line x1="500" y1="158" x2="500" y2="188" stroke="#00d4aa" stroke-width="0.8" opacity="0.4"/>

    <!-- stat 4 -->
    <text x="580" y="168" text-anchor="middle" font-weight="700" font-size="18" fill="#00d4aa" filter="url(#glow)">25,800+</text>
    <text x="580" y="184" text-anchor="middle" fill="#6b9e80">HOURS LOGGED</text>

    <!-- divider -->
    <line x1="660" y1="158" x2="660" y2="188" stroke="#00d4aa" stroke-width="0.8" opacity="0.4"/>

    <!-- stat 5 -->
    <text x="740" y="168" text-anchor="middle" font-weight="700" font-size="18" fill="#00d4aa" filter="url(#glow)">&lt;60s</text>
    <text x="740" y="184" text-anchor="middle" fill="#6b9e80">LEAD RESPONSE</text>
  </g>

  <!-- Bottom border line -->
  <line x1="0" y1="210" x2="900" y2="210" stroke="#00d4aa" stroke-width="1.5" opacity="0.3"/>

  <!-- Corner dots - decorative -->
  <circle cx="12" cy="12" r="3" fill="#00d4aa" opacity="0.5"/>
  <circle cx="888" cy="12" r="3" fill="#00d4aa" opacity="0.5"/>
  <circle cx="12" cy="208" r="3" fill="#00d4aa" opacity="0.5"/>
  <circle cx="888" cy="208" r="3" fill="#00d4aa" opacity="0.5"/>

  <!-- Blinking cursor effect -->
  <rect x="654" y="73" width="3" height="28" fill="#00d4aa">
    <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
